name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Stage local secrets
        env:
          SUPERAGENT_USERNAME: ${{ secrets.SUPERAGENT_USERNAME }}
          SUPERAGENT_PASSWORD: ${{ secrets.SUPERAGENT_PASSWORD }}
          GAC_ACCOUNT_1_EMAIL: ${{ secrets.GAC_ACCOUNT_1_EMAIL }}
          GAC_ACCOUNT_1_PASSWORD: ${{ secrets.GAC_ACCOUNT_1_PASSWORD }}
          GAC_ACCOUNT_2_EMAIL: ${{ secrets.GAC_ACCOUNT_2_EMAIL }}
          GAC_ACCOUNT_2_PASSWORD: ${{ secrets.GAC_ACCOUNT_2_PASSWORD }}
        run: |
          SECRETS_FILE="$RUNNER_TEMP/release-secrets.env"
          umask 077
          {
            printf 'GAC_ACCOUNT_1_EMAIL=%q\n' "$GAC_ACCOUNT_1_EMAIL"
            printf 'GAC_ACCOUNT_1_PASSWORD=%q\n' "$GAC_ACCOUNT_1_PASSWORD"
            printf 'GAC_ACCOUNT_2_EMAIL=%q\n' "$GAC_ACCOUNT_2_EMAIL"
            printf 'GAC_ACCOUNT_2_PASSWORD=%q\n' "$GAC_ACCOUNT_2_PASSWORD"
          } > "$SECRETS_FILE"
          echo "SECRETS_FILE=$SECRETS_FILE" >> "$GITHUB_ENV"

      - name: Stage Sparkle private key
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [[ -z "${SPARKLE_ED_PRIVATE_KEY:-}" ]]; then
            echo "::error::SPARKLE_ED_PRIVATE_KEY secret is not set — see docs/SPARKLE.md"
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_priv"
          umask 077
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          echo "SPARKLE_PRIVATE_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Build DMG + sign appcast
        run: CLANG_MODULE_CACHE_PATH=/tmp/swift-module-cache ./release.sh

      - name: Compute checksum
        id: sha
        run: echo "sha=$(shasum -a 256 dist/SuperAgentIsland-*.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## SuperAgentIsland ${VERSION}"
            echo
            echo "- DMG: SuperAgentIsland-${VERSION}.dmg"
            echo "- Appcast: appcast.xml"
            echo
            echo "**SHA-256:** \`${{ steps.sha.outputs.sha }}\`"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SuperAgentIsland-*.dmg
            dist/appcast.xml
          body_path: release_notes.md
